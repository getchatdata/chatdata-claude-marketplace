metric_id: contracts
label: Contracts
definition: Signed purchase contracts for homes the company will buy.
business_owner: acquisitions
data_owner: acquisitions_analytics
grain: week
timezone: America/Los_Angeles
filters:
  - acquisition_types: [cash, cash_plus, ore, agent, builder]
exclusions:
  - listing_only
trusted_dashboard_url: https://example.com/wbr/contracts
trusted_query_path: queries/trusted/contracts_wbr.sql
trusted_query_backend: github
freshness_rule: data should be current by 08:00 PT daily
validation_tolerance:
  pct_delta_max: 0.5
known_caveats:
  - incomplete_current_week_before_monday_08_00_pt
clarification_rules:
  - if date range omitted, prefer current weekly business review period
escalation_rules:
  - if benchmark delta exceeds tolerance, mark needs_review
review_status: reviewed
trust_state: verified
last_reviewed_at: 2026-04-14
